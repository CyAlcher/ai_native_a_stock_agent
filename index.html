    "prompt": "角色设定\n\n你是一位兼具A股消费行业投研首席与行为金融学背景的资深投资策略专家，精通茅台（贵州茅台，600519）的估值模型、产业周期、资金博弈及历史收益率分布。\n\n核心任务\n\n基于用户的核心关切——“关于茅台：预期收益率多少？我打算拿多久？”，请你按照以下结构化分析框架，输出一份量化与定性结合的推演报告。\n\n输入参数（用户未提供时，基于中性情景假设）\n\n当前宏观环境：温和复苏，名义GDP增速4.5-5%\n\n当前茅台估值：PE(TTM) 约28-32倍，对应PEG略高于1\n\n持仓成本：按当前市价（或用户指定成本，否则设为1倍现价）\n\n必须输出的子维度\n1. 持有期情景推演（3种标准持有周期）\n\na. 短期（1年内）：\n\n收益驱动因子：春节/中秋旺季批价波动、月度经营数据、外资流向\n\n预期收益率区间：-15% ~ +25%\n\n胜率（基于近10年滚动数据）：约55-60%\n\n核心风险：渠道库存扰动、茅台1935价格倒挂、大盘流动性收缩\n\nb. 中期（3-5年）：\n\n收益驱动因子：直营占比提升、系列酒增长、产能释放节奏（2030年5.6万吨基酒目标）\n\n预期年化收益率区间：+8% ~ +15%\n\n胜率：约75-80%\n\n核心假设：不提价情况下量增5-7% + 结构升级贡献2-3%\n\nc. 长期（10年及以上）：\n\n收益驱动因子：通胀+高端白酒护城河折现、提价能力（近10年出厂价CAGR约5%）、分红再投资\n\n预期年化收益率区间：+10% ~ +18%（含股息率约1.5-2%）\n\n胜率：>90%（持有10年任意时点买入，历史无亏损）\n\n对标基准：名义GDP增速 + 超额护城河溢价\n\n2. 关键阈值与触发再评估条件\n\n若持有期 ≤ 3年：关注批价能否站稳3000元、散茅与整箱价差是否扩大\n\n若持有期 > 5年：重点观测人口结构对高端白酒长期吨价的约束（改用“人均可支配收入增速”替代）\n\n3. 逆向提示（行为纠偏）\n\n避免因“股价跌10%即否定长期逻辑”而止损\n\n避免因“单次茅台提价10%”线性外推未来5年增长率\n\n4. 最终输出格式\n\n按照以下三段式给出结论：\n\n【匹配建议持有期】: ______\n【对应预期年化收益率中枢】: ______ （附区间）\n【核心跟踪指标与前置信条】: ______ （2-3条量化阈值）\n\n本回答由 AI 生成，内容仅供参考，请仔细甄别。"
  }
];

// 统计节点
const nodeCount = {};
promptData.forEach(d => { nodeCount[d.node] = (nodeCount[d.node] || 0) + 1; });

// 渲染筛选按钮
const filterWrap = document.getElementById('filterWrap');
function buildFilters() {
    filterWrap.innerHTML = `<button class="filter-btn active" data-node="all">全部(${promptData.length})</button>`;
    Object.entries(nodeCount).forEach(([node, cnt]) => {
        filterWrap.innerHTML += `<button class="filter-btn" data-node="${node}">${node}(${cnt})</button>`;
    });
}
buildFilters();

// 渲染卡片
function renderCards(data) {
    const container = document.getElementById('cardList');
    const stats = document.getElementById('stats');
    stats.textContent = `显示 ${data.length} 条`;
    if (!data.length) {
        container.innerHTML = '<div class="empty">没有找到匹配的提示词</div>';
        return;
    }
    container.innerHTML = '';
    data.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-meta">
                <span class="node-tag">${item.node}</span>
                <span class="freq-badge freq-${item.frequency}">${item.frequency}</span>
            </div>
            <div class="question">💬 ${item.question}</div>
            <div class="btn-group">
                <button class="btn btn-expand" data-i="${i}">展开提示词</button>
                <button class="btn btn-copy" data-i="${i}">复制</button>
                <button class="btn btn-yuanbao" data-i="${i}">去 DeepSeek 用 →</button>
            </div>
            <div class="prompt-box" id="pb-${i}">${item.prompt}</div>
        `;
        container.appendChild(card);
    });
    // 保存当前渲染的数据引用，供点击事件使用
    container._data = data;
}

renderCards(promptData);

// 筛选
filterWrap.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const node = btn.dataset.node;
    applyFilters(node, document.getElementById('searchInput').value.trim());
});

// 搜索
document.getElementById('searchInput').addEventListener('input', e => {
    const activeNode = document.querySelector('.filter-btn.active')?.dataset.node || 'all';
    applyFilters(activeNode, e.target.value.trim());
});

function applyFilters(node, keyword) {
    let data = node === 'all' ? promptData : promptData.filter(d => d.node === node);
    if (keyword) {
        const kw = keyword.toLowerCase();
        data = data.filter(d => d.question.toLowerCase().includes(kw) || d.prompt.toLowerCase().includes(kw));
    }
    renderCards(data);
}

// 展开 / 复制 / 跳转
document.addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const i = btn.dataset.i;
    const container = document.getElementById('cardList');
    const item = container._data?.[i];
    if (!item) return;

    if (btn.classList.contains('btn-expand')) {
        const box = document.getElementById('pb-' + i);
        box.classList.toggle('show');
        btn.textContent = box.classList.contains('show') ? '收起提示词' : '展开提示词';
    }
    if (btn.classList.contains('btn-copy')) {
        navigator.clipboard.writeText(item.prompt).then(() => {
            btn.textContent = '✅ 已复制';
            setTimeout(() => btn.textContent = '复制', 1500);
        });
    }
    if (btn.classList.contains('btn-yuanbao')) {
        navigator.clipboard.writeText(item.prompt);
        window.open('https://chat.deepseek.com/', '_blank');
    }
});
</script>
</body>
</html>
